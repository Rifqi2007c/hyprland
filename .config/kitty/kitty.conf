include ~/.cache/wal/colors-kitty.conf

# font_family family="0xProto Nerd Font"
font_size 13.0

# BEGIN_KITTY_FONTS
font_family      family='0xProto Nerd Font' postscript_name=0xProtoNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS


# window padding
window_padding_width 10
window_padding_height 10

# cursor animation
cursor_trail 1
cursor_start_threshold 15
cursor_trail_decay 0.01 0.2
cursor_shape block
cursor_blink true

shell_integration no-cursor\
allow_remote_control yes
