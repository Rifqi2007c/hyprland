

##############
### SOURCE ###
##############

source = ~/.config/hypr/keybind.conf  # keybinds
source = ~/.cache/wal/colors-hyprland.conf # pywal

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/

## default settings
monitor = preferred,auto,1

## laptop
#monitor = eDP-1,1920x1080@60,0x0,1

## desktop
#monitor = HDMI-A-1,1920x1080@100,0x0,1
#monitor = DP-1,1920x1080@60,1920x0,1,transform,1


## assign workspace for multiple monitor
 #workspace=1, monitor:HDMI-A-1, persistent:true, default:true
 #workspace=2, monitor:HDMI-A-1, persistent:true, default:true
 #workspace=3, monitor:HDMI-A-1, persistent:true, default:true
 #workspace=4, monitor:HDMI-A-1, persistent:true, default:true
 #workspace=5, monitor:HDMI-A-1, persistent:true, default:true
 #workspace=6, monitor:HDMI-A-1, persistent:true, default:true

 #workspace=7, monitor:DP-1, persistent:true, default:true
 #workspace=8, monitor:DP-1, persistent:true, default:true
 #workspace=9, monitor:DP-1, persistent:true, default:true

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
 exec-once = cava &
 exec-once = swww-daemon &
 exec-once = nm-applet &
 exec-once = waybar &
 exec-once = swaync &
 exec-once = systemctl --user start hyprpolkitagent &
 exec-once = ~/.config/hypr/scripts/player-notification/player-notification-run.sh &
 exec-once = easyeffects --gapplication-service &
 exec-once = notify-send "hyprland loaded"

## dual monitor waybar (disable waybar on top before use this)
 #exec-once = waybar -c ~/.config/waybar/config-primary &
 #exec-once = waybar -c ~/.config/waybar/config-secondary &

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Nordzy-cursors-white-HYPR
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1

## nvidia
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
# env = NVD_BACKEND,direct
# env = __VK_LAYER_NV_optimus=NVIDIA_only


xwayland {
    force_zero_scaling = true
}

cursor {
    no_hardware_cursors = true
}

render { 
    cm_enabled = false 
}

misc:render_unfocused_fps = 0
misc:vrr = 2

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color4 $color2 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = true

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 1
        
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.0, 0.1, 1.0
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = space, 0.05, 0.09, 0.1, 0.99
    animation = windows, 1, 4, wind, slide
    animation = windowsIn, 1, 4, winIn, slide
    animation = windowsOut, 1, 3, winOut, slide
    animation = windowsMove, 1, 3, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 2, space, slidefadedevert 4%

    #layer animation
    bezier = In, 0.64, 1.1, 0.32, 1.0

    animation = layersIn, 1, 8, In, liner
    animation = layersOut, 1, 6, In, liner
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
  new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    repeat_delay = 250

    follow_mouse = 1
    
    ## touchpad
    sensitivity = -0.1 # -1.0 - 1.0, 0 means no modification.
    ## mouse
    #sensitivity = -0.8

    touchpad {
        natural_scroll = false
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

windowrule = opacity 0.90, match:class spotify
windowrule = float 1, opacity 0.86, size 600 500, move 990 40, match:class org.pulseaudio.pavucontrol
windowrule = float 1, opacity 0.90, size 800 700, move 410 90, match:class thunar
windowrule = opacity 0.94, match:class Alacritty
windowrule = opacity 0.96, match:class obsidian
windowrule = opacity 0.90, match:class steam
windowrule = opacity 0.90, match:class discord
windowrule = opacity 0.94, match:class kitty

## layerrule blur
# swaync
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window

layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

# waybar
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

layerrule {
  name = swaync-control-center
  match:namespace = swaync-control-center
  
  animation = slide right
}

windowrule {
  name = drun
  match:class = Rofi
    
  pin = 1
  float = 1
  opacity = 0.84
  animation = slide down
}

windowrule {
  name = powermenu
  match:class = Rofi
  match:title = rofi - power
    
  pin = 1
  float = 1
  opacity = 0.84
  move = 1720 40
  animation = slide down
}

windowrule {
  name = wallselect
  match:class = Rofi
  match:title = rofi - wal
    
  pin = 1
  float = 1
  opacity = 0.84
  animation = gnome
}
